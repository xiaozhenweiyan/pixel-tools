<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素预测器 PIXEL PREDICTOR</title>
  <link rel="stylesheet" href="styles/pixel.css">
</head>
<body>
  <header class="pixel-panel" style="text-align:center; margin:20px;">
    <h1 class="pixel-title">像素预测器 PIXEL PREDICTOR</h1>
    <p class="pixel-subtitle">输入数字序列 · 20 种数学方法预测 · 复古深空像素风</p>
  </header>

  <main class="layout">
    <!-- LEFT MAIN AREA -->
    <section class="main-area">
      <!-- Input Panel -->
      <div class="pixel-panel input-panel">
        <h2>输入数字序列</h2>
        <textarea id="input-series" class="pixel-input" rows="4" placeholder="输入数字，用空格/逗号/换行分隔，如：1, 2, 3, 5, 8, 13"></textarea>
        <div class="button-row">
          <div class="predict-count-wrap">
            <button id="btn-predict" class="pixel-btn">预测</button>
            <input type="number" id="predict-count" class="pixel-input predict-count-input" value="1" min="1" max="50" title="预测数量">
          </div>
          <button id="btn-reset" class="pixel-btn">重置</button>
          <button id="btn-export-json" class="pixel-btn">导出 JSON</button>
          <button id="btn-export-csv" class="pixel-btn">导出 CSV</button>
        </div>
        <div class="weight-mode">
          <span>权重模式：</span>
          <label><input type="radio" name="weight-mode" value="backtest" checked> 回测权重</label>
          <label><input type="radio" name="weight-mode" value="uniform"> 均匀权重</label>
        </div>
        <div class="training-progress" id="training-progress" style="display:none;">
          <div class="progress-label" id="progress-label">训练中...</div>
          <div class="pixel-progress-track">
            <div class="pixel-progress-fill" id="progress-fill" style="width:0%;"></div>
          </div>
        </div>
      </div>

      <!-- Ensemble Result Panel -->
      <div class="pixel-panel result-panel">
        <h2>融合预测结果</h2>
        <div id="ensemble-result" class="ensemble-display">— 等待输入 —</div>
      </div>

      <!-- Neural Network Panel -->
      <div class="pixel-panel nn-panel">
        <h2>神经网络预测</h2>
        <div class="nn-canvas-wrap">
          <canvas id="nn-canvas"></canvas>
        </div>
        <div class="nn-result" id="nn-result">— 等待输入 —</div>
      </div>
    </section>

    <!-- RIGHT SIDEBAR -->
    <aside class="sidebar">
      <!-- Weight Bars Panel -->
      <div class="pixel-panel">
        <h2>方法权重</h2>
        <canvas id="weight-chart" width="400" height="500"></canvas>
      </div>

      <!-- Method List Panel -->
      <div class="pixel-panel">
        <h2>20 种方法详情</h2>
        <div id="method-list" class="method-list">— 等待预测 —</div>
      </div>
    </aside>
  </main>

  <div class="chart-panel-bottom pixel-panel">
    <h2>折线图（拖动滚动条平移 · +/- 缩放）</h2>
    <div class="chart-canvas-wrap" id="line-chart-wrap">
      <canvas id="line-chart"></canvas>
      <!-- 自制滚动条 -->
      <div class="pixel-scrollbar-h" id="scrollbar-h"><div class="pixel-scrollbar-thumb-h" id="scrollbar-thumb-h"></div></div>
      <div class="pixel-scrollbar-v" id="scrollbar-v"><div class="pixel-scrollbar-thumb-v" id="scrollbar-thumb-v"></div></div>
      <!-- 缩放按钮 -->
      <div class="zoom-controls">
        <button class="pixel-btn pixel-zoom-btn" id="btn-zoom-in">+</button>
        <button class="pixel-btn pixel-zoom-btn" id="btn-zoom-out">−</button>
      </div>
    </div>
    <div class="pixel-panel function-fit-panel" id="function-fit-panel" style="display:none;">
      <h2>拟合函数</h2>
      <div class="function-fit-content" id="function-fit-content">
        <div class="fit-formula" id="fit-formula">f(x) = —</div>
        <div class="fit-info">
          <span id="fit-domain">定义域: —</span>
          <span id="fit-range">值域: —</span>
          <span id="fit-r2">R²: —</span>
        </div>
      </div>
    </div>
  </div>

  <footer class="pixel-panel" style="text-align:center; margin:20px;">
    <p>© 2026 Pixel Predictor · MIT License · 复古深空像素风</p>
  </footer>

  <div id="toast" class="pixel-panel pixel-toast" style="display:none;"></div>

  <!-- Scripts loaded at end of body, in this exact order -->
  <script src="js/predictors.js"></script>
  <script src="js/weights.js"></script>
  <script src="js/nn.js"></script>
  <script src="js/funcfit.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
